
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flete TDL</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>

<div id="estado">Sistema listo</div>

<header class="header">
<h1>Flete TDL</h1>
</header>

<div class="container">

<label>Origen</label>
<input id="origen">

<label>Destino</label>
<input id="destino">

<button onclick="calcularRuta()">Calcular ruta</button>

<label>Kilómetros</label>
<input id="km">

<label>Ejes</label>
<select id="ejes">
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5" selected>5</option>
<option value="6">6</option>
</select>

<label>Rendimiento km/L</label>
<input id="rend" value="2.3">

<label>Precio Diesel</label>
<input id="diesel" value="26">

<button onclick="calcularFlete()">Calcular Flete</button>
<button onclick="borrar()">Borrar</button>

<div id="map"></div>
<div id="resultado"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="dataset_tolls.js"></script>
<script src="geocoder.js"></script>
<script src="router.js"></script>
<script src="toll_detector.js"></script>
<script src="tariffs.js"></script>
<script src="app.js"></script>

</body>
</html>
