
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cotizacion TDL</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="header">
<img src="logo.png" class="logo">
<h1>Cotizacion TDL</h1>
</div>

<div class="container">

<label>Cliente</label>
<input id="cliente">

<label>Origen</label>
<input id="origen">

<label>Destino</label>
<input id="destino">

<button onclick="calcularRuta()">Calcular ruta</button>

<label>Kilómetros</label>
<input id="km">

<label>Tipo de camión</label>
<select id="camion">
<option value="camioneta">Camioneta 2 ejes</option>
<option value="3e">Camión 3 ejes</option>
<option value="r4">Rabón 4 ejes</option>
<option value="t5">Torton / Tráiler 5 ejes</option>
<option value="t6">Tráiler 6 ejes</option>
<option value="full">Full doble remolque</option>
</select>

<label>Precio Diesel</label>
<input id="diesel" value="24">

<label>Costo Operativo</label>
<input id="operativo" value="2000">

<button onclick="calcularFlete()">Calcular Cotización</button>

<div id="precios"></div>
<div id="casetas"></div>

<button onclick="generarJPG()">Generar JPG</button>
<button onclick="generarPDF()">Generar PDF</button>

<h2>Historial</h2>
<div id="historial"></div>

<div id="map"></div>

</div>

<script src="ruta.js"></script>
<script src="casetas.js"></script>
<script src="cotizacion.js"></script>

</body>
</html>
