<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flete TDL</title>

<style>

body{
font-family: -apple-system, Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#0d1b34;
color:white;
padding:18px;
font-size:26px;
font-weight:bold;
display:flex;
align-items:center;
gap:10px;
}

header img{
width:40px;
border-radius:6px;
}

.container{
padding:16px;
max-width:420px;
margin:auto;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:18px;
margin-bottom:10px;
}

#resultado{
background:white;
padding:16px;
border-radius:12px;
margin-top:10px;
}

</style>

</head>

<body>

<header>
<img src="https://raw.githubusercontent.com/edmex71/Fletes-tdl/main/logo.png">
Flete TDL
</header>

<div class="container">

<label>Origen</label>
<input id="origen">

<label>Destino</label>
<input id="destino">

<label>Kilómetros</label>
<input id="km" type="number">

<label>Casetas (T5)</label>
<input id="casetas" type="number">

<label>Precio Diesel</label>
<input id="diesel" value="26">

<button onclick="calcular()">Calcular Flete</button>

<div id="resultado"></div>

</div>

<script>

function redondear100(valor){
return Math.round(valor/100)*100
}

function calcular(){

let km=parseFloat(document.getElementById("km").value)
let casetas=parseFloat(document.getElementById("casetas").value)
let diesel=parseFloat(document.getElementById("diesel").value)

let rendimiento=2.6

let litros=km/rendimiento
let costoDiesel=litros*diesel

let costoTotal=costoDiesel+casetas

let precioBajo=redondear100(costoTotal*1.2)
let precioMedio=redondear100(costoTotal*1.35)
let precioAlto=redondear100(costoTotal*1.5)

document.getElementById("resultado").innerHTML=

"Litros: "+litros.toFixed(1)+"<br><br>"+

"Costo Diesel: $"+costoDiesel.toFixed(0)+"<br>"+

"Casetas: $"+casetas+"<br><br>"+

"Precio Bajo: $"+precioBajo+"<br>"+

"Precio Medio: $"+precioMedio+"<br>"+

"Precio Alto: $"+precioAlto

}

</script>

</body>
</html>
