<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flete TDL v36.1</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>

input,button,select{width:100%;margin:8px 0;padding:12px;border-radius:8px;}

</style>
</head>
<body>

<div class="header">
<img src="logo.png">
<h1>Flete TDL v36.1</h1>
</div>

<input id="origen" placeholder="Origen">
<input id="destino" placeholder="Destino">

<select id="ejes">
<option value="1">1 eje</option>
<option value="3">3 ejes</option>
<option value="5" selected>5 ejes</option>
</select>

<button onclick="calcularRuta()">Calcular ruta</button>

<div id="map"></div>

<h3>Casetas (<span id="count">0</span>)</h3>
<ul id="casetas"></ul>

<h3>Total casetas: $<span id="totalCasetas">0</span></h3>

<input id="km" readonly>
<input id="rendimiento" value="2.3">
<input id="diesel" value="26">

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
