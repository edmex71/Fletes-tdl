<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flete TDL v26</title>

<style>
body{
  font-family: Arial;
  margin:0;
  padding:10px;
}

input, select, button{
  width:100%;
  margin:8px 0;
  padding:10px;
  font-size:16px;
}

button{
  background:#4a67b3;
  color:white;
  border:none;
  border-radius:8px;
}

#map{
  height:300px;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>Sistema listo</h2>
<h1>Flete TDL v26</h1>

<label>Origen</label>
<input type="text" placeholder="Ej: CDMX">

<label>Destino</label>
<input type="text" placeholder="Ej: Puebla">

<button>Calcular ruta</button>

<div id="map">
<iframe
  width="100%"
  height="100%"
  frameborder="0"
  src="https://www.openstreetmap.org/export/embed.html">
</iframe>
</div>

<label>Kilómetros</label>
<input type="number">

<label>Ejes</label>
<select>
<option>5</option>
<option>6</option>
</select>

<label>Rendimiento km/L</label>
<input type="number" value="2.3">

<label>Precio Diesel</label>
<input type="number" value="26">

<button>Calcular Flete</button>
<button>Borrar</button>

</body>
</html>
