
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cotizacion Transportes D' Leon</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="container">

<img src="logo.png" class="logo">
<h1>Cotizacion Transportes D' Leon</h1>

<label>Cliente</label>
<input id="cliente">

<label>Origen</label>
<input id="origen">

<label>Destino</label>
<input id="destino">

<button onclick="calcularRuta()">Calcular kilómetros</button>

<label>Kilómetros</label>
<input id="km" readonly>

<label>Tipo de ejes</label>
<select id="ejes">
<option value="camion_4_5_ejes">Camión 4‑5 ejes</option>
<option value="camion_6_ejes">Camión 6 ejes</option>
<option value="camion_2_3_ejes">Camión 2‑3 ejes</option>
<option value="auto">Auto</option>
</select>

<label>Viaje</label>
<select id="viaje">
<option value="1">Solo ida</option>
<option value="2">Ida y vuelta</option>
</select>

<label>Precio Diesel</label>
<input id="diesel" value="24">

<label>Rendimiento km/L</label>
<input id="rendimiento" value="2.8">

<label>Costo Operativo</label>
<input id="operativo" value="0">

<label>Precio mínimo</label>
<input id="minimo" value="3000">

<div id="precios" class="result">
Precio bajo: $NaN<br>
Precio medio: $NaN<br>
Precio alto: $NaN
</div>

<select id="precioElegido">
<option value="alto">Precio Alto</option>
<option value="medio">Precio Medio</option>
<option value="bajo">Precio Bajo</option>
</select>

<button onclick="calcularCotizacion()">Calcular Cotización</button>
<button onclick="generarJPG()">Generar Cotización JPG</button>
<button onclick="generarPDF()">Generar Cotización PDF</button>
<button onclick="enviarWhatsApp()">Enviar WhatsApp</button>
<button onclick="guardarCotizacion()">Guardar Cotización</button>
<button onclick="reiniciar()">Reiniciar</button>

<h2>Historial</h2>
<div id="historial"></div>

</div>

<script src="mapa.js"></script>
<script src="casetas.js"></script>
<script src="cotizacion.js"></script>
<script src="app.js"></script>

</body>
</html>
