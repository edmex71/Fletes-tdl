<h2>Flete TDL</h2>
</header>

<div class="container">

<label>Origen</label>
<input id="origen">

<label>Destino</label>
<input id="destino">

<button onclick="calcularRuta()">Calcular ruta</button>

<label>Kilómetros</label>
<input id="km">

<label>Tipo de camión</label>
<select id="camion">
<option value="t3">Camión 3 ejes</option>
<option value="t5" selected>Tráiler 5 ejes</option>
<option value="t6">Tráiler 6 ejes</option>
<option value="full">Full</option>
</select>

<label>Precio Diesel</label>
<input id="diesel" value="24">

<button onclick="calcular()">Calcular Flete</button>
<button onclick="generarCotizacion()">Enviar Cotización</button>

<div id="map"></div>
<div id="resultado"></div>

<canvas id="canvas" width="800" height="800" style="display:none;"></canvas>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map=L.map('map').setView([23,-102],5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let ruta;
let precioAlto=0;

const tarifas={
t3:3.2,
t5:4.6,
t6:5.2,
full:6.8
};

async function geocode(lugar){
let r=await fetch("https://nominatim.openstreetmap.org/search?format=json&q="+lugar);
let j=await r.json();
return [j[0].lat,j[0].lon];
}

async function calcularRuta(){

let origen=document.getElementById("origen").value;
let destino=document.getElementById("destino").value;

let o=await geocode(origen);
let d=await geocode(destino);

let r=await fetch(`https://router.project-osrm.org/route/v1/driving/${o[1]},${o[0]};${d[1]},${d[0]}?overview=full&geometries=geojson`);
let j=await r.json();

let km=(j.routes[0].distance/1000).toFixed(0);
document.getElementById("km").value=km;

let coords=j.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);

if(ruta) map.removeLayer(ruta);
ruta=L.polyline(coords).addTo(map);

map.fitBounds(ruta.getBounds());

}

function calcular(){

let km=parseFloat(document.getElementById("km").value||0);
let diesel=parseFloat(document.getElementById("diesel").value||0);
let tipo=document.getElementById("camion").value;

let casetas = km * tarifas[tipo];

let bajo=km*22;
let medio=km*32;
let alto=km*38;

precioAlto=alto;

let litros=km/2.5;
let dieselCosto=litros*diesel;

let costoTotal=dieselCosto+casetas;

let utilidad=alto-costoTotal;

document.getElementById("resultado").innerHTML=
"Casetas aprox: $"+casetas.toFixed(0)+"<br><br>"+
"Precio bajo: $"+bajo+"<br>"+
"Precio medio: $"+medio+"<br>"+
"Precio alto: $"+alto+"<br><br>"+
"Diesel: $"+dieselCosto.toFixed(0)+"<br>"+
"Costo total: $"+costoTotal.toFixed(0)+"<br>"+
"Utilidad aprox: $"+utilidad.toFixed(0);

}

function redondearCien(valor){
return Math.round(valor/100)*100;
}

function generarCotizacion(){

let precioRedondeado = redondearCien(precioAlto);

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

ctx.fillStyle="white";
