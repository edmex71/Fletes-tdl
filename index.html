
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Flete TDL v37</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="css/styles.css"/>

</head>

<body>

<header>
<img src="img/icon.png" height="40">
<h2>Flete TDL v37</h2>
</header>

<label>Origen</label>
<input id="origen" placeholder="Ej: Puebla">

<label>Destino</label>
<input id="destino" placeholder="Ej: Guadalajara">

<label>Ejes</label>
<select id="ejes">
<option value="2">2 ejes</option>
<option value="3">3 ejes</option>
<option value="4">4 ejes</option>
<option value="5" selected>5 ejes</option>
<option value="6">6 ejes</option>
</select>

<button onclick="calcularRuta()">Calcular ruta</button>

<div id="map"></div>

<h3>Kilómetros</h3>
<input id="km">

<h3>Casetas detectadas</h3>
<ul id="listaCasetas"></ul>

<h3>Total casetas</h3>
<input id="totalCasetas">

<h3>Precio sugerido</h3>

<select id="tipoPrecio">
<option value="bajo">Bajo</option>
<option value="medio">Medio</option>
<option value="alto">Alto</option>
<option value="km">Por KM</option>
</select>

<input id="precioFinal">

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="js/app.js"></script>

</body>
</html>
