<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flete TDL v27</title>

<style>
body{
  font-family: Arial;
  margin:0;
  padding:10px;
}

h1{
  margin:10px 0;
}

input, select, button{
  width:100%;
  margin:8px 0;
  padding:12px;
  font-size:16px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  background:#4a67b3;
  color:white;
  border:none;
}

#map{
  height:300px;
  margin:15px 0;
}
</style>
</head>

<body>

<h2>Sistema listo</h2>
<h1>Flete TDL v27</h1>

<label>Origen</label>
<input type="text" id="origen" placeholder="Ej: CDMX">

<label>Destino</label>
<input type="text" id="destino" placeholder="Ej: Puebla">

<button onclick="calcularRuta()">Calcular ruta</button>

<div id="map">
<iframe
  width="100%"
  height="100%"
  frameborder="0"
  src="https://www.openstreetmap.org/export/embed.html">
</iframe>
</div>

<label>Kilómetros</label>
<input type="number" id="km">

<label>Ejes</label>
<select id="ejes">
<option>5</option>
<option>6</option>
</select>

<label>Rendimiento km/L</label>
<input type="number" id="rendimiento" value="2.3">

<label>Precio Diesel</label>
<input type="number" id="diesel" value="26">

<button onclick="calcularFlete()">Calcular Flete</button>
<button onclick="limpiar()">Borrar</button>

<script>
function calcularRuta(){
  alert("Ruta simulada (base estable)");
}

function calcularFlete(){
  let km = document.getElementById('km').value;
  let rendimiento = document.getElementById('rendimiento').value;
  let diesel = document.getElementById('diesel').value;

  if(km && rendimiento && diesel){
    let litros = km / rendimiento;
    let costo = litros * diesel;
    alert("Costo estimado: $" + Math.round(costo));
  } else {
    alert("Completa los datos");
  }
}

function limpiar(){
  document.getElementById('km').value="";
}
</script>

</body>
</html>
