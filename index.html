<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flete TDL PRO MAX</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>

<header>
<img src="icon192.png">
Flete TDL PRO MAX
</header>

<div class="container">

<h3>Cliente</h3>
<input id="cliente">

<h3>Origen</h3>
<input id="origen" list="ciudades">

<h3>Destino</h3>
<input id="destino" list="ciudades">

<datalist id="ciudades">
<option>Guadalajara</option>
<option>Monterrey</option>
<option>Ciudad de México</option>
<option>Querétaro</option>
<option>León</option>
<option>Puebla</option>
<option>San Luis Potosí</option>
<option>Torreón</option>
<option>Saltillo</option>
<option>Aguascalientes</option>
<option>Hermosillo</option>
<option>Mexicali</option>
<option>Tijuana</option>
<option>Culiacán</option>
<option>Durango</option>
<option>Chihuahua</option>
<option>Nuevo Laredo</option>
<option>Reynosa</option>
<option>Matamoros</option>
<option>Tampico</option>
</datalist>

<button onclick="calcularRuta()">Calcular kilómetros</button>

<div id="map"></div>

<label>Kilómetros</label>
<input id="km">

<label>Tipo de camión</label>
<select id="camion" onchange="setEjes()">
<option value="2">Camioneta</option>
<option value="3">Torton</option>
<option value="4">Rabón</option>
<option value="5" selected>Tráiler</option>
<option value="6">Full</option>
</select>

<label>Ejes</label>
<input id="ejes" value="5">

<label>Precio Diesel</label>
<input id="diesel" value="24">

<label>Rendimiento km/L</label>
<input id="rendimiento" value="2.8">

<div id="resultado"></div>

<button onclick="calcular()">Calcular Cotización</button>
<button onclick="enviarWhatsApp()">Enviar WhatsApp</button>
<button onclick="generarImagen()">Generar Cotización JPG</button>
<button onclick="reiniciar()">Reiniciar</button>

<h3>Historial</h3>
<div id="historial"></div>

</div>

<script src="app.js"></script>
</body>
</html>
