<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flete TDL v29</title>

<style>
body{font-family: Arial; margin:0; padding:10px;}
input, select, button{width:100%; margin:8px 0; padding:12px; border-radius:8px;}
button{background:#4a67b3;color:white;border:none;}
#map{height:300px;margin:15px 0;}
</style>
</head>

<body>

<h2>Sistema listo</h2>
<h1>Flete TDL v29</h1>

<label>Origen</label>
<input id="origen">

<label>Destino</label>
<input id="destino">

<button onclick="calcularRuta()">Calcular ruta</button>

<div id="map">
<iframe width="100%" height="100%" frameborder="0"
src="https://www.openstreetmap.org/export/embed.html"></iframe>
</div>

<label>Kilómetros</label>
<input id="km" readonly>

<label>Ejes</label>
<select id="ejes"><option>5</option><option>6</option></select>

<label>Rendimiento</label>
<input id="rendimiento" value="2.3">

<label>Diesel</label>
<input id="diesel" value="26">

<button onclick="calcularFlete()">Calcular Flete</button>

<script src="app.js"></script>

</body>
</html>
