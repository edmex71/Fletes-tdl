
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flete TDL</title>

<link rel="stylesheet" href="style.css">
<link rel="apple-touch-icon" href="icon.png">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body>

<header>
<img src="icon.png">
Flete TDL
<button onclick="toggleDark()">🌙</button>
</header>

<div class="container">

<label>Cliente</label>
<input id="cliente">
<button onclick="guardarCliente()">Guardar cliente</button>

<label>Origen</label>
<input id="origen">

<label>Destino</label>
<input id="destino">

<button onclick="calcularRuta()">Calcular ruta</button>

<div id="map"></div>

<label>Kilómetros</label>
<input id="km">

<label>Tipo de camión</label>
<select id="camion" onchange="setEjes()">
<option value="2">Camioneta (2 ejes)</option>
<option value="3">Torton (3 ejes)</option>
<option value="4">Rabón (4 ejes)</option>
<option value="5" selected>Tráiler (5 ejes)</option>
<option value="6">Full (6 ejes)</option>
</select>

<label>Ejes</label>
<input id="ejes" value="5">

<label>Precio Diesel</label>
<input id="diesel" value="24">

<label>Rendimiento km/L</label>
<input id="rendimiento" value="2.8">

<div id="resultado"></div>

<button onclick="calcular()">Calcular Flete</button>
<button onclick="enviarWhatsApp()">Enviar WhatsApp</button>
<button onclick="generarImagen()">Generar JPG</button>
<button onclick="reiniciar()">Reiniciar</button>

<h3>Historial</h3>
<div id="historial"></div>

</div>

<script src="app.js"></script>

</body>
</html>
