
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cotización Transportes D' Leon</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>Cotización Transportes D' Leon</h1>

<label>Cliente</label>
<input id="cliente">

<label>Origen</label>
<input id="origen">

<label>Destino</label>
<input id="destino">

<button onclick="calcularRuta()">Calcular ruta</button>

<label>Kilómetros</label>
<input id="km">

<label>Tipo de camión</label>
<select id="camion">
<option value="2.8">Tráiler 5 ejes</option>
<option value="3.5">Torton</option>
<option value="4.5">Rabón</option>
</select>

<label>Precio Diesel</label>
<input id="diesel" value="24">

<label>Costo Operativo</label>
<input id="operativo" value="0">

<div id="resultado"></div>

<button onclick="calcularCotizacion()">Calcular Cotización</button>
<button onclick="generarJPG()">Generar JPG</button>
<button onclick="generarPDF()">Generar PDF</button>

</div>

<script src="mapa.js"></script>
<script src="casetas_osm.js"></script>
<script src="cotizacion.js"></script>

</body>
</html>
