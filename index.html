
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cotizacion Transportes D' Leon</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<header>
<img src="icon192.png">
Cotizacion Transportes D' Leon
</header>

<div class="container">

<label>Cliente</label>
<input id="cliente">

<label>Origen</label>
<input id="origen">

<label>Destino</label>
<input id="destino">

<button onclick="calcularRuta()">Calcular kilómetros</button>

<div id="map"></div>

<label>Kilómetros</label>
<input id="km">

<label>Viaje</label>
<select id="tipoViaje">
<option value="1">Solo ida</option>
<option value="2">Ida y vuelta</option>
</select>

<label>Tipo de camión</label>
<select id="camion">
<option value="5" selected>Tráiler</option>
</select>

<label>Precio Diesel</label>
<input id="diesel" value="24">

<label>Rendimiento km/L</label>
<input id="rendimiento" value="2.8">

<div id="resultado"></div>

<select id="precioSeleccionado">
<option value="bajo">Precio Bajo</option>
<option value="medio">Precio Medio</option>
<option value="alto" selected>Precio Alto</option>
</select>

<button onclick="calcular()">Calcular Cotización</button>
<button onclick="guardarHistorial()">Guardar Cotización</button>
<button onclick="generarImagen()">Generar Cotización JPG</button>
<button onclick="reiniciar()">Reiniciar</button>

<h3>Historial</h3>
<div id="historial"></div>

</div>

<script src="app.js"></script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}
</script>

</body>
</html>
