<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Flete TDL</title>

<link rel="apple-touch-icon" href="icon.png">

<style>

body{
font-family:-apple-system,Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#0d1b34;
color:white;
padding:20px;
font-size:26px;
display:flex;
align-items:center;
gap:12px;
}

header img{
width:40px;
border-radius:8px;
}

.container{
padding:20px;
max-width:420px;
margin:auto;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:12px;
font-size:18px;
margin-top:10px;
}

#resultado{
background:white;
padding:16px;
margin-top:20px;
border-radius:12px;
}

#historial{
margin-top:20px;
background:white;
padding:15px;
border-radius:12px;
}

</style>
</head>

<body>

<header>
<img src="icon.png">
Flete TDL
</header>

<div class="container">

<label>Origen</label>
<input id="origen">

<label>Destino</label>
<input id="destino">

<label>Kilómetros</label>
<input id="km" type="number">

<label>Precio Diesel</label>
<input id="diesel" type="number" value="24">

<label>Rendimiento km/L</label>
<input id="rendimiento" type="number" value="2.8">

<label>Costo Casetas</label>
<input id="casetas" type="number">

<label>Costo operador</label>
<input id="operador" type="number" value="2000">

<label>Utilidad %</label>
<input id="utilidad" type="number" value="25">

<button onclick="calcular()">Calcular Flete</button>

<button onclick="guardar()">Guardar Cotización</button>

<button onclick="enviar()">Enviar Cotización</button>

<div id="resultado"></div>

<div id="historial">
<b>Cotizaciones guardadas</b>
<div id="lista"></div>
</div>

</div>

<script>

let resultadoTexto=""

function calcular(){

let km=parseFloat(document.getElementById("km").value)
let diesel=parseFloat(document.getElementById("diesel").value)
let rendimiento=parseFloat(document.getElementById("rendimiento").value)
let casetas=parseFloat(document.getElementById("casetas").value)
let operador=parseFloat(document.getElementById("operador").value)
let utilidad=parseFloat(document.getElementById("utilidad").value)

let litros=km/rendimiento

let costoDiesel=litros*diesel

let subtotal=costoDiesel+casetas+operador

let ganancia=subtotal*(utilidad/100)

let total=subtotal+ganancia

let precioKm=total/km

resultadoTexto=

`
Origen: ${document.getElementById("origen").value}<br>
Destino: ${document.getElementById("destino").value}<br><br>

Litros usados: ${litros.toFixed(1)} L<br>
Costo Diesel: $${costoDiesel.toFixed(0)}<br>
Casetas: $${casetas}<br>
Operador: $${operador}<br><br>

Precio medio km: $${precioKm.toFixed(2)}<br><br>

<b>Total Flete: $${total.toFixed(0)}</b>
`

document.getElementById("resultado").innerHTML=resultadoTexto

}

function guardar(){

let historial=JSON.parse(localStorage.getItem("cotizaciones")||"[]")

historial.push(resultadoTexto)

localStorage.setItem("cotizaciones",JSON.stringify(historial))

mostrar()

}

function mostrar(){

let historial=JSON.parse(localStorage.getItem("cotizaciones")||"[]")

let html=""

historial.forEach(c=>{

html+=`<div style="margin-top:10px;border-bottom:1px solid #ddd;padding:10px">${c}</div>`

})

document.getElementById("lista").innerHTML=html

}

function enviar(){

let texto=document.getElementById("resultado").innerText

let url=`https://wa.me/?text=${encodeURIComponent(texto)}`

window.open(url)

}

mostrar()

</script>

</body>
</html>
