
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flete TDL</title>

<link rel="apple-touch-icon" href="icon.png">

<style>
body{
font-family:-apple-system,Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#0d1b34;
color:white;
padding:18px;
font-size:24px;
display:flex;
align-items:center;
gap:12px;
}

header img{
width:36px;
border-radius:6px;
}

.container{
padding:16px;
max-width:420px;
margin:auto;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#2563eb;
color:white;
border:none;
border-radius:12px;
font-size:18px;
margin-top:10px;
}

#map{
height:250px;
margin-bottom:15px;
border-radius:12px;
}

#resultado{
background:white;
padding:16px;
margin-top:15px;
border-radius:12px;
}
</style>
</head>

<body>

<header>
<img src="icon.png">
Flete TDL
</header>

<div class="container">

<label>Origen</label>
<input id="origen" placeholder="Ciudad origen">

<label>Destino</label>
<input id="destino" placeholder="Ciudad destino">

<button onclick="calcularRuta()">Calcular kilómetros</button>

<div id="map"></div>

<label>Kilómetros</label>
<input id="km">

<label>Precio Diesel</label>
<input id="diesel" value="24">

<label>Rendimiento km/L</label>
<input id="rendimiento" value="2.8">

<label>Costo Casetas</label>
<input id="casetas">

<label>Costo operador</label>
<input id="operador" value="2000">

<label>Utilidad %</label>
<input id="utilidad" value="25">

<button onclick="calcular()">Calcular Flete</button>

<button onclick="enviar()">Enviar Cotización</button>

<div id="resultado"></div>

</div>

<script>

let map
let directionsService
let directionsRenderer

function initMap(){

map=new google.maps.Map(document.getElementById("map"),{
zoom:6,
center:{lat:23,lng:-102}
})

directionsService=new google.maps.DirectionsService()
directionsRenderer=new google.maps.DirectionsRenderer()

directionsRenderer.setMap(map)

}

function calcularRuta(){

let origen=document.getElementById("origen").value
let destino=document.getElementById("destino").value

directionsService.route({
origin:origen,
destination:destino,
travelMode:"DRIVING"
},function(result,status){

if(status==="OK"){

directionsRenderer.setDirections(result)

let km=result.routes[0].legs[0].distance.value/1000

document.getElementById("km").value=km.toFixed(0)

}

})

}

function calcular(){

let km=parseFloat(document.getElementById("km").value)

let diesel=parseFloat(document.getElementById("diesel").value)

let rendimiento=parseFloat(document.getElementById("rendimiento").value)

let casetas=parseFloat(document.getElementById("casetas").value||0)

let operador=parseFloat(document.getElementById("operador").value)

let utilidad=parseFloat(document.getElementById("utilidad").value)

let litros=km/rendimiento

let costoDiesel=litros*diesel

let subtotal=costoDiesel+casetas+operador

let ganancia=subtotal*(utilidad/100)

let total=subtotal+ganancia

let precioKm=total/km

let html=`
Litros usados: ${litros.toFixed(1)} L<br>
Costo Diesel: $${costoDiesel.toFixed(0)}<br>
Casetas: $${casetas}<br>
Operador: $${operador}<br><br>
Precio por km: $${precioKm.toFixed(2)}<br><br>
<b>Total Flete: $${total.toFixed(0)}</b>
`

document.getElementById("resultado").innerHTML=html

}

function enviar(){

let texto=document.getElementById("resultado").innerText

window.open("https://wa.me/?text="+encodeURIComponent(texto))

}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=&callback=initMap" async defer></script>

</body>
</html>
